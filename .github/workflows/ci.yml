name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  rust:
    name: Rust (${{ matrix.features }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: managed
            cargo_features: --all-features
          - features: open-source
            cargo_features: --no-default-features
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Cache Cargo downloads and build output
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            icegres/target
          key: rust-${{ runner.os }}-${{ matrix.features }}-${{ hashFiles('rust-toolchain.toml', 'icegres/Cargo.lock') }}
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.1 --profile minimal --component rustfmt --component clippy
      - name: Check formatting
        if: matrix.features == 'managed'
        working-directory: icegres
        run: cargo fmt --all -- --check
      - name: Lint
        working-directory: icegres
        run: cargo clippy --release --locked --all-targets ${{ matrix.cargo_features }} -- -D warnings
      - name: Test
        working-directory: icegres
        run: cargo test --release --locked ${{ matrix.cargo_features }}

  supply-chain:
    name: Rust supply chain
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Cache Cargo tools and indexes
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/bin/cargo-deny
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-deny-${{ runner.os }}-0.20.2-${{ hashFiles('rust-toolchain.toml', 'icegres/Cargo.lock') }}
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.1 --profile minimal
      - name: Install cargo-deny
        run: test "$(cargo deny --version 2>/dev/null)" = "cargo-deny 0.20.2" || cargo install cargo-deny --locked --version 0.20.2 --force
      - name: Check advisories, licenses, bans, and sources
        working-directory: icegres
        run: cargo deny check

  clients:
    name: JavaScript and Python clients
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install JavaScript workspace from lockfile
        run: npm ci --ignore-scripts
      - name: Test JavaScript workspace
        run: npm test
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: clients/bi/extract/pyproject.toml
      - name: Install BI extract client with publish extras
        run: python -m pip install -e './clients/bi/extract[publish]'
      - name: Test BI extract client
        run: python -m unittest discover -s clients/bi/extract/tests -v

  helm:
    name: Helm chart
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go for pinned Helm/kubeconform bootstrap
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: "1.26.x"
          cache: false
      - name: Cache pinned chart tools and schemas
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/icegres-helm-tools
          key: helm-tools-${{ runner.os }}-${{ hashFiles('tests/helm.sh') }}
      - name: Lint, render, compare goldens, and validate schemas
        run: bash tests/helm.sh

  container:
    name: Container smoke test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Build image
        run: docker build --tag icegres:ci .
      - name: Verify safe default and packaged binaries
        run: |
          docker run --rm icegres:ci
          docker run --rm --entrypoint /usr/local/bin/icegresd icegres:ci --version
          docker run --rm --entrypoint /usr/local/bin/icekeeperd icegres:ci --version
