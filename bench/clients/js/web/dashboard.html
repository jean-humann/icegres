<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>icegres — frontend dashboard demo</title>
<style>
  :root {
    --surface: #fcfcfb; --ink: #0b0b0b; --ink-2: #52514e;
    --grid: #e4e3df; --accent: #2a78d6; --accent-2: #008300;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #1a1a19; --ink: #ffffff; --ink-2: #c3c2b7;
      --grid: #3a3936; --accent: #3987e5; --accent-2: #008300;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px; background: var(--surface); color: var(--ink);
    font: 14px/1.45 system-ui, sans-serif;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: var(--ink-2); margin: 0 0 16px; }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  select, button {
    font: inherit; color: var(--ink); background: var(--surface);
    border: 1px solid var(--grid); border-radius: 6px; padding: 6px 10px;
  }
  button { cursor: pointer; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .card { border: 1px solid var(--grid); border-radius: 10px; padding: 16px; }
  .card h2 { font-size: 13px; font-weight: 600; color: var(--ink-2); margin: 0 0 10px; }
  .tiles { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .tile { border: 1px solid var(--grid); border-radius: 10px; padding: 14px 18px; min-width: 160px; }
  .tile .v { font-size: 26px; font-weight: 650; font-variant-numeric: tabular-nums; }
  .tile .l { color: var(--ink-2); font-size: 12px; }
  .timing { color: var(--ink-2); font-size: 12px; margin-top: 14px; }
  svg text { fill: var(--ink-2); font-size: 11px; }
  .err { color: #e34948; white-space: pre-wrap; }
  table { border-collapse: collapse; width: 100%; font-variant-numeric: tabular-nums; }
  td, th { text-align: left; padding: 4px 8px; border-bottom: 1px solid var(--grid); }
  th { color: var(--ink-2); font-weight: 600; }
</style>
</head>
<body>
  <h1>icegres live dashboard</h1>
  <p class="sub">Same queries, selectable data path — Arrow over Flight SQL vs JSON over pgwire, proxied or browser-direct.</p>
  <div class="controls">
    <label>Data path
      <select id="path">
        <option value="arrow-proxy">arrow-proxy — Flight SQL → Arrow IPC via proxy</option>
        <option value="grpcweb-direct">grpcweb-direct — browser speaks Flight SQL (gRPC-web)</option>
        <option value="flight-json">flight-json — Flight SQL → JSON via proxy</option>
        <option value="pg-json">pg-json — pgwire → JSON via proxy</option>
      </select>
    </label>
    <button id="refresh">Refresh</button>
    <span class="timing" id="status"></span>
  </div>
  <div class="tiles" id="tiles"></div>
  <div class="grid">
    <div class="card"><h2>Trips by city</h2><div id="bars"></div></div>
    <div class="card"><h2>Fare over time</h2><div id="line"></div></div>
    <div class="card"><h2>Latest trips</h2><div id="tbl"></div></div>
  </div>
  <script type="module" src="/dist/dashboard.js"></script>
</body>
</html>
