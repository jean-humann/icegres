# Tableau -> pgjdbc connection properties for icegres.
# Place in: ~/Documents/My Tableau Repository/Datasources/postgresql.properties
# (applies to every PostgreSQL connection this Tableau Desktop makes).
#
# icegres refuses extended-protocol SELECT inside an explicit transaction
# (SQLSTATE 0A000, docs/limitations.md) - the shape pgjdbc produces when a
# transaction is open, e.g. fetch-size streaming (autocommit=false +
# setFetchSize). Simple query mode keeps every Tableau read legal at a
# negligible cost for BI result shapes.
preferQueryMode=simple
