# Source: icegres/templates/configmap.yaml
# Lakehouse wiring shared by every compute (writer + read replicas):
# non-secret, envFrom'd as ICEGRES_* variables.
apiVersion: v1
kind: ConfigMap
metadata:
  name: icegres
  namespace: icegres-system
  labels:
    helm.sh/chart: icegres-0.1.0
    app.kubernetes.io/name: icegres
    app.kubernetes.io/instance: icegres
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
data:
