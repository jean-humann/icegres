---
# Source: icegres/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: icegres
  namespace: icegres-system
  labels:
    helm.sh/chart: icegres-0.1.0
    app.kubernetes.io/name: icegres
    app.kubernetes.io/instance: icegres
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
# No pod mounts a token by default; only the icegresd pod opts back in,
# and only when k8sScaling.enabled needs the scale-subresource PATCH.
automountServiceAccountToken: false
