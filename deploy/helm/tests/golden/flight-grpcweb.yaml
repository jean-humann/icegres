# Source: icegres/templates/writer-service.yaml
# Headless: the StatefulSet's governing Service, what icegresd dials (a
# scaled-to-zero writer resolves to nothing, which is the wake signal),
# what read replicas peer-tail, and where TLS-requiring clients connect
# directly (icegresd answers SSLRequest with 'N'; TLS terminates here).
apiVersion: v1
kind: Service
metadata:
  name: icegres-writer
  namespace: icegres-system
  labels:
    helm.sh/chart: icegres-0.1.0
    app.kubernetes.io/name: icegres
    app.kubernetes.io/instance: icegres
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: writer
spec:
  clusterIP: None
  # Not-ready addresses ARE published. The wake signal is "no pod at
  # all" (a scaled-to-zero writer has no pod, so DNS is empty either
  # way), and everything that dials this name treats TCP-accept as
  # readiness: icegres binds pgwire only after the catalog session is
  # built (+ tail election/replay), so an accepting compute is servable.
  # Without this, the catalog-aware /ready turns a catalog blip into a
  # black-hole: the alive writer vanishes from DNS, icegresd's wake poll
  # can never resolve it, and every NEW connection hangs for
  # icegresd.wakeTimeoutMs even though buffered writes only need the
  # catalog at flush.
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: icegres
    app.kubernetes.io/instance: icegres
    app.kubernetes.io/component: writer
  ports:
    - name: pgwire
      port: 5439
      targetPort: pgwire
    - name: health
      port: 8080
      targetPort: health
