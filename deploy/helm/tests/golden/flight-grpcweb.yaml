apiVersion: apps/v1
kind: Deployment
metadata:
  name: icegres-flight
  namespace: icegres-system
  labels:
    helm.sh/chart: icegres-0.1.0
    app.kubernetes.io/name: icegres
    app.kubernetes.io/instance: icegres
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: flight
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: icegres
      app.kubernetes.io/instance: icegres
      app.kubernetes.io/component: flight
  template:
    metadata:
      labels:
        helm.sh/chart: icegres-0.1.0
        app.kubernetes.io/name: icegres
        app.kubernetes.io/instance: icegres
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: flight
    spec:
      serviceAccountName: icegres
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: icegres
                    app.kubernetes.io/instance: icegres
                    app.kubernetes.io/component: flight
      terminationGracePeriodSeconds: 40
      containers:
        - name: flight
          image: "icegres:0.1.0"
          imagePullPolicy: IfNotPresent
          args: ["flight-serve", "--host", "0.0.0.0"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          envFrom:
            - configMapRef:
                name: icegres
          env:
            - name: ICEGRES_FLIGHT_PORT
              value: "50051"
            - name: ICEGRES_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: icegres
                  key: s3-access-key
            - name: ICEGRES_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: icegres
                  key: s3-secret-key
            - name: ICEGRES_AUTH_FILE
              value: /etc/icegres/auth/users
            - name: ICEGRES_FLIGHT_TLS_CERT
              value: /etc/icegres/tls/tls.crt
            - name: ICEGRES_FLIGHT_TLS_KEY
              value: /etc/icegres/tls/tls.key
            - name: ICEGRES_GRPC_WEB
              value: "true"
            - name: ICEGRES_CORS_ORIGIN
              value: "https://dash.example"
            - name: ICEGRES_FRESHNESS_MS
              value: "250"
            - name: ICEGRES_FLIGHT_STATEMENT_TIMEOUT_MS
              value: "30000"
            - name: ICEGRES_FLIGHT_MAX_RESULT_BYTES
              value: "8.388608e+06"
            - name: ICEGRES_FLIGHT_MAX_CONCURRENT_RPCS
              value: "64"
            - name: ICEGRES_HEALTH_PORT
              value: "8080"
            - name: ICEGRES_FLIGHT_READ_ONLY
              value: "true"
          ports:
            - name: flight
              containerPort: 50051
            - name: health
              containerPort: 8080
          startupProbe:
            tcpSocket:
              port: flight
            periodSeconds: 2
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: flight
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            # /ready is catalog-aware once a health port is served.
            httpGet:
              path: /ready
              port: health
            periodSeconds: 5
          resources:
            limits:
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: auth
              mountPath: /etc/icegres/auth
              readOnly: true
            - name: tls
              mountPath: /etc/icegres/tls
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: auth
          secret:
            secretName: icegres
            items:
              - key: users
                path: users
        - name: tls
          secret:
            secretName: icegres-tls
