# Source: icegres/templates/icegresd-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: icegres
  namespace: icegres-system
  labels:
    helm.sh/chart: icegres-0.1.0
    app.kubernetes.io/name: icegres
    app.kubernetes.io/instance: icegres
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: icegresd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: icegres
      app.kubernetes.io/instance: icegres
      app.kubernetes.io/component: icegresd
  template:
    metadata:
      labels:
        helm.sh/chart: icegres-0.1.0
        app.kubernetes.io/name: icegres
        app.kubernetes.io/instance: icegres
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: icegresd
    spec:
      serviceAccountName: icegres
      # The token exists solely for the scale-subresource PATCH.
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: icegresd
          image: "icegres:0.1.0"
          imagePullPolicy: IfNotPresent
          command: ["/usr/bin/tini", "--", "/usr/local/bin/icegresd"]
          args: ["serve"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          env:
            - name: ICEGRESD_HOST
              value: "0.0.0.0"
            - name: ICEGRESD_PORT
              value: "5432"
            # k8s mode: the main compute is the writer Service, never a
            # forked child (see `icegresd serve --help`).
            - name: ICEGRESD_K8S_COMPUTE
              value: "true"
            - name: ICEGRESD_COMPUTE_HOST
              value: "icegres-writer"
            - name: ICEGRESD_MAIN_PORT
              value: "5439"
            - name: ICEGRESD_WAKE_TIMEOUT_MS
              value: "120000"
            - name: ICEGRESD_STATUS_FILE
              value: /tmp/icegresd-status.json
            # SCRAM computes cannot be pre-handshaked by the proxy: keep
            # the pool off instead of letting every warm attempt fail.
            - name: ICEGRESD_POOL_SIZE
              value: "0"
          ports:
            - name: pgwire
              containerPort: 5432
          livenessProbe:
            tcpSocket:
              port: pgwire
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: pgwire
            periodSeconds: 5
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # readOnlyRootFilesystem: the status file needs a writable /tmp.
        - name: tmp
          emptyDir: {}
