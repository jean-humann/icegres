# Source: icegres/templates/writer-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: icegres-writer
  namespace: icegres-system
  labels:
    helm.sh/chart: icegres-0.1.0
    app.kubernetes.io/name: icegres
    app.kubernetes.io/instance: icegres
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: writer
spec:
  # One buffering writer per lake — always. With k8sScaling.enabled,
  # icegresd parks this at 0 replicas when idle and wakes it on connect
  # (a `helm upgrade` resets it to 1; the idle loop parks it again).
  replicas: 1
  serviceName: icegres-writer
  selector:
    matchLabels:
      app.kubernetes.io/name: icegres
      app.kubernetes.io/instance: icegres
      app.kubernetes.io/component: writer
  template:
    metadata:
      labels:
        helm.sh/chart: icegres-0.1.0
        app.kubernetes.io/name: icegres
        app.kubernetes.io/instance: icegres
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: writer
    spec:
      serviceAccountName: icegres
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      # > the 30 s in-flight drain + buffered-write flush on SIGTERM.
      terminationGracePeriodSeconds: 40
      containers:
        - name: writer
          image: "icegres:0.1.0"
          imagePullPolicy: IfNotPresent
          args: ["serve", "--host", "0.0.0.0"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          envFrom:
            - configMapRef:
                name: icegres
          env:
            - name: ICEGRES_PORT
              value: "5439"
            - name: ICEGRES_HEALTH_PORT
              value: "8080"
            - name: ICEGRES_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: icegres
                  key: s3-access-key
            - name: ICEGRES_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: icegres
                  key: s3-secret-key
            - name: ICEGRES_AUTH_FILE
              value: /etc/icegres/auth/users
            - name: ICEGRES_TLS_CERT
              value: /etc/icegres/tls/tls.crt
            - name: ICEGRES_TLS_KEY
              value: /etc/icegres/tls/tls.key
          ports:
            - name: pgwire
              containerPort: 5439
            - name: health
              containerPort: 8080
          # Startup headroom: /health binds only AFTER the catalog session
          # build (+ quorum election + tail replay on the failover path).
          # Without this the liveness probe below would kill a slow boot
          # ~20-30s in, forever — CrashLoopBackOff on the chart's own
          # failover trigger. Tunable via writer.startupProbe.
          startupProbe:
            httpGet:
              path: /health
              port: health
            periodSeconds: 2
            failureThreshold: 60
          # Liveness must NOT touch the catalog (a catalog blip is not a
          # reason to restart) — but it DOES report a wedged durable tail
          # as 503, which is exactly what must kill this pod.
          livenessProbe:
            httpGet:
              path: /health
              port: health
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            periodSeconds: 5
          resources:
            limits:
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: auth
              mountPath: /etc/icegres/auth
              readOnly: true
            - name: tls
              mountPath: /etc/icegres/tls
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: auth
          secret:
            secretName: icegres
            items:
              - key: users
                path: users
        - name: tls
          secret:
            secretName: icegres-tls
