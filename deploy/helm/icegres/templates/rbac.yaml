{{- include "icegres.validate" . -}}
{{- if .Values.k8sScaling.enabled }}
{{/*
The COMPLETE RBAC surface of icegresd's k8s mode: [get, patch] on the
scale subresource of exactly one named object — the writer StatefulSet
it wakes (0->1 on a cold connection) and parks (->0 when idle). See
icegres/src/k8s.rs; anything broader here is a bug.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "icegres.fullname" . }}-scale
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "icegres.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets/scale"]
    resourceNames: ["{{ include "icegres.fullname" . }}-writer"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "icegres.fullname" . }}-scale
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "icegres.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "icegres.fullname" . }}-scale
subjects:
  - kind: ServiceAccount
    name: {{ include "icegres.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
