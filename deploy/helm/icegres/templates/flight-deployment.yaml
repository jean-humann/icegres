{{- include "icegres.validate" . -}}
{{- if .Values.flight.enabled }}
{{/*
The Arrow Flight SQL endpoint (`icegres flight-serve`): the ADBC fast
lane and — with flight.grpcWeb — the browser-dashboard endpoint
(@icegres/flight-web speaks gRPC-web straight at this port; see
docs/frontend-dashboards.md). Stateless read computes like -read, and
like them rendered WITHOUT any buffered-write/tail environment (a
Flight process opening the writer's tail would fence it). Liveness and
startup stay TCP on the gRPC port — the listener binds only after the
catalog session is wired, the same "accepting = serving" contract the
health probe encodes elsewhere. With flight.healthPort set, flight-serve
also serves a plain-HTTP /ready (catalog-aware), used for readiness.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "icegres.fullname" . }}-flight
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "icegres.labels" . | nindent 4 }}
    app.kubernetes.io/component: flight
spec:
  replicas: {{ int .Values.flight.replicas }}
  selector:
    matchLabels:
      {{- include "icegres.selectorLabels" (dict "ctx" $ "component" "flight") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "icegres.labels" . | nindent 8 }}
        app.kubernetes.io/component: flight
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "icegres.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "icegres.selectorLabels" (dict "ctx" $ "component" "flight") | nindent 20 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 40
      containers:
        - name: flight
          image: {{ include "icegres.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["flight-serve", "--host", "0.0.0.0"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "icegres.fullname" . }}
          env:
            - name: ICEGRES_FLIGHT_PORT
              value: {{ .Values.flight.port | int64 | quote }}
            - name: ICEGRES_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "icegres.s3SecretName" . }}
                  key: s3-access-key
            - name: ICEGRES_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "icegres.s3SecretName" . }}
                  key: s3-secret-key
            {{- if .Values.auth.enabled }}
            - name: ICEGRES_AUTH_FILE
              value: /etc/icegres/auth/users
            {{- else }}
            - name: ICEGRES_INSECURE
              value: "true"
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: ICEGRES_FLIGHT_TLS_CERT
              value: /etc/icegres/tls/tls.crt
            - name: ICEGRES_FLIGHT_TLS_KEY
              value: /etc/icegres/tls/tls.key
            {{- end }}
            {{- if .Values.flight.grpcWeb }}
            - name: ICEGRES_GRPC_WEB
              value: "true"
            - name: ICEGRES_CORS_ORIGIN
              value: {{ .Values.flight.corsOrigin | quote }}
            {{- end }}
            {{- if ne .Values.flight.resultCompression "zstd" }}
            - name: ICEGRES_RESULT_COMPRESSION
              value: {{ .Values.flight.resultCompression | quote }}
            {{- end }}
            {{- if gt (int64 .Values.flight.freshnessMs) 0 }}
            - name: ICEGRES_FRESHNESS_MS
              value: {{ .Values.flight.freshnessMs | int64 | quote }}
            {{- end }}
            {{- if gt (int64 .Values.flight.statementTimeoutMs) 0 }}
            - name: ICEGRES_FLIGHT_STATEMENT_TIMEOUT_MS
              value: {{ .Values.flight.statementTimeoutMs | int64 | quote }}
            {{- end }}
            {{- if gt (int64 .Values.flight.maxResultBytes) 0 }}
            - name: ICEGRES_FLIGHT_MAX_RESULT_BYTES
              value: {{ .Values.flight.maxResultBytes | int64 | quote }}
            {{- end }}
            {{- if gt (int64 .Values.flight.maxConcurrentRpcs) 0 }}
            - name: ICEGRES_FLIGHT_MAX_CONCURRENT_RPCS
              value: {{ .Values.flight.maxConcurrentRpcs | int64 | quote }}
            {{- end }}
            - name: ICEGRES_FLIGHT_MAX_PREPARED_STATEMENTS
              value: {{ .Values.flight.maxPreparedStatements | int64 | quote }}
            - name: ICEGRES_FLIGHT_PREPARED_STATEMENT_TTL_SECS
              value: {{ .Values.flight.preparedStatementTtlSecs | int64 | quote }}
            - name: ICEGRES_FLIGHT_MAX_AUTH_CACHE_ENTRIES
              value: {{ .Values.flight.maxAuthCacheEntries | int64 | quote }}
            {{- if .Values.flight.healthPort }}
            - name: ICEGRES_HEALTH_PORT
              value: {{ .Values.flight.healthPort | int64 | quote }}
            {{- end }}
            {{- if .Values.flight.readOnly }}
            - name: ICEGRES_FLIGHT_READ_ONLY
              value: "true"
            {{- end }}
            {{- with .Values.flight.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: flight
              containerPort: {{ int .Values.flight.port }}
            {{- if .Values.flight.healthPort }}
            - name: health
              containerPort: {{ int .Values.flight.healthPort }}
            {{- end }}
          startupProbe:
            tcpSocket:
              port: flight
            periodSeconds: 2
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: flight
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            {{- if .Values.flight.healthPort }}
            # /ready is catalog-aware once a health port is served.
            httpGet:
              path: /ready
              port: health
            {{- else }}
            tcpSocket:
              port: flight
            {{- end }}
            periodSeconds: 5
          resources:
            {{- toYaml .Values.flight.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.auth.enabled }}
            - name: auth
              mountPath: /etc/icegres/auth
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/icegres/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.auth.enabled }}
        - name: auth
          secret:
            secretName: {{ include "icegres.authSecretName" . }}
            items:
              - key: users
                path: users
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.existingSecret }}
        {{- end }}
{{- end }}
