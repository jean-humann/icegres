{{- include "icegres.validate" . -}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "icegres.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "icegres.labels" . | nindent 4 }}
# No pod mounts a token by default; only the icegresd pod opts back in,
# and only when k8sScaling.enabled needs the scale-subresource PATCH.
automountServiceAccountToken: false
{{- end }}
