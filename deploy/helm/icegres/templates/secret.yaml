{{- include "icegres.validate" . -}}
{{/*
The chart-managed Secret: rendered only for the sections that (a) need a
secret and (b) did not bring an existingSecret. Prefer existingSecret in
anything beyond a demo — inline values land in the release manifest.
*/}}
{{- $s3Managed := not .Values.s3.existingSecret }}
{{- $authManaged := and .Values.auth.enabled (not .Values.auth.existingSecret) }}
{{- if or $s3Managed $authManaged }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "icegres.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "icegres.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $s3Managed }}
  s3-access-key: {{ .Values.s3.accessKey | quote }}
  s3-secret-key: {{ .Values.s3.secretKey | quote }}
  {{- end }}
  {{- if $authManaged }}
  users: {{ .Values.auth.users | quote }}
  {{- if .Values.auth.peerTailPassword }}
  peer-tail-password: {{ .Values.auth.peerTailPassword | quote }}
  {{- end }}
  {{- end }}
{{- end }}
